<!DOCTYPE html>
<!-- Объявляем тип документа как HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы, указываем язык — русский -->

<head>
    <!-- Начало раздела с метаданными страницы (не отображается в контенте) -->
    <meta charset="UTF-8">
    <!-- Устанавливаем кодировку UTF-8 для поддержки русских символов -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Настраиваем viewport для корректного отображения на мобильных устройствах -->
    <title>Моя страница</title>
    <!-- Заголовок страницы, отображается во вкладке браузера -->

    <style>
        /* Начало блока CSS-стилей для оформления страницы */
        body {
            /* Стили для всего тела страницы */
            margin: 0;
            /* Убираем стандартные отступы браузера */
            min-height: 100vh;
            /* Минимальная высота — 100% высоты экрана */
            display: flex;
            /* Включаем Flexbox для центрирования содержимого */
            justify-content: center;
            /* Центрируем по горизонтали */
            align-items: center;
            /* Центрируем по вертикали */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Устанавливаем современный шрифт без засечек */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Задаём красивый градиентный фон от фиолетового к синему */
        }

        .container {
            /* Стили для контейнера — обёртки всего контента */
            background: white;
            /* Белый фон контейнера */
            padding: 40px;
            /* Внутренние отступы 40 пикселей со всех сторон */
            border-radius: 15px;
            /* Закруглённые углы контейнера */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            /* Тень для эффекта «парения» над фоном */
            text-align: center;
            /* Центрируем весь текст внутри контейнера */
            max-width: 500px;
            /* Ограничиваем максимальную ширину контейнера */
        }

        h1 {
            /* Стили для заголовка первого уровня */
            color: #333;
            /* Тёмно-серый цвет текста */
            margin-bottom: 20px;
            /* Отступ снизу 20 пикселей */
        }

        p {
            /* Стили для параграфа */
            color: #666;
            /* Серый цвет текста */
            line-height: 1.6;
            /* Увеличенный межстрочный интервал для читаемости */
            margin-bottom: 25px;
            /* Отступ снизу 25 пикселей */
        }

        img {
            /* Стили для изображения */
            max-width: 100%;
            /* Картинка не превышает ширину контейнера */
            border-radius: 10px;
            /* Закруглённые углы у картинки */
            margin-bottom: 25px;
            /* Отступ снизу 25 пикселей */
        }

        button {
            /* Стили для кнопки */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Градиентный фон кнопки в тон основному фону */
            color: white;
            /* Белый цвет текста кнопки */
            border: none;
            /* Убираем стандартную рамку */
            padding: 12px 30px;
            /* Внутренние отступы кнопки */
            font-size: 16px;
            /* Размер шрифта кнопки */
            border-radius: 25px;
            /* Сильно закруглённые углы кнопки */
            cursor: pointer;
            /* Курсор-рука при наведении на кнопку */
            transition: transform 0.2s, box-shadow 0.2s;
            /* Плавная анимация трансформации и тени */
        }

        button:hover {
            /* Стили для кнопки при наведении курсора */
            transform: translateY(-2px);
            /* Кнопка немного «всплывает» вверх */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            /* Добавляем тень при наведении */
        }
    </style>
</head>

<body>
    <!-- Начало видимой части страницы -->

    <div class="container">
        <!-- Открываем контейнер-обёртку для центрирования всего контента -->

        <!-- Блок для ввода имени -->
        <div id="input-section">
            <!-- Открываем секцию с полем ввода -->
            <h1>Привет, как тебя зовут?</h1>
            <!-- Заголовок с вопросом -->

            <input type="text" id="name-input" placeholder="Введите ваше имя">
            <!-- Поле ввода текста:
                 type="text" — текстовое поле,
                 id="name-input" — уникальный идентификатор для доступа через JavaScript,
                 placeholder — текст-подсказка в пустом поле -->

            <button onclick="showGreeting()">Продолжить</button>
            <!-- Кнопка с обработчиком onclick — при клике вызовет функцию showGreeting() -->
        </div>
        <!-- Конец секции ввода -->

        <!-- Блок для приветствия (скрыт по умолчанию) -->
        <div id="greeting-section" style="display: none;">
            <!-- Открываем секцию приветствия:
                 style="display: none;" — скрываем элемент до момента показа -->
            <h1 id="greeting-text"></h1>
            <!-- Заголовок для приветствия:
                 id="greeting-text" — идентификатор для изменения текста через JavaScript -->

            <img src="https://via.placeholder.com/400x200" alt="Изображение-заглушка">
            <!-- Вставляем картинку-заглушку -->

            <button onclick="resetForm()">Вернуться</button>
            <!-- Кнопка для возврата к форме ввода -->
        </div>
        <!-- Конец секции приветствия -->

    </div>
    <!-- Закрываем контейнер -->

    <script>
        /* Начало блока JavaScript для интерактивности */
        function showGreeting() {
            /* Функция для отображения приветствия с именем */
            const name = document.getElementById('name-input').value;
            /* Получаем значение из поля ввода по его id */

            if (name.trim() !== '') {
                /* Проверяем, что имя не пустое (trim удаляет пробелы по краям) */
                document.getElementById('greeting-text').textContent = 'Привет, ' + name + '!';
                /* Устанавливаем текст приветствия с введённым именем */

                document.getElementById('input-section').style.display = 'none';
                /* Скрываем секцию ввода */

                document.getElementById('greeting-section').style.display = 'block';
                /* Показываем секцию приветствия (block — делает элемент видимым) */
            } else {
                /* Если имя пустое */
                alert('Пожалуйста, введите ваше имя!');
                /* Показываем всплывающее окно с предупреждением */
            }
        }

        function resetForm() {
            /* Функция для возврата к форме ввода */
            document.getElementById('name-input').value = '';
            /* Очищаем поле ввода */

            document.getElementById('greeting-section').style.display = 'none';
            /* Скрываем секцию приветствия */

            document.getElementById('input-section').style.display = 'block';
            /* Показываем секцию ввода */
        }
    </script>

</body>
<!-- Конец видимой части страницы -->

</html>
<!-- Закрываем корневой элемент html -->
